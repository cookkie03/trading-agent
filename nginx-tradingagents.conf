server {
    listen 80;
    server_name tradingagents.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tradingagents.duckdns.org;

    ssl_certificate /home/hermes/.acme.sh/tradingagents.duckdns.org/fullchain.cer;
    ssl_certificate_key /home/hermes/.acme.sh/tradingagents.duckdns.org/tradingagents.duckdns.org.key;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Streamlit requires it)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }
}
